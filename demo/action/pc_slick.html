<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slick pc</title>
    <script type="text/javascript" src="http://js.modetour.com/jQuery/ver/2.1.0.min.js"></script>
    <style>
        *{margin:0; padding:0;}
        .slick_wrap{overflow: hidden; margin:40px 0;}
        .slick_wrap .comment{font-size: 18px; padding:20px;}
        button{border:none; background:transparent;}
        img{max-width: 100%;;}
    </style>
</head>
<body>
     <!--slick-->		
     <script type="text/javascript" src="http://www.modetour.com/event/event_18/9511/slick.min.js"></script>
     <link rel="stylesheet" type="text/css" href="http://www.modetour.com/event/event_18/9511/slick.css">
     <style type="text/css">
            .slick1.event_wrap {position: relative; min-width:800px; margin:0 auto;}
            .slick1.event_wrap img{vertical-align: middle;}
            .slick1.event_wrap>div{background-repeat: no-repeat; background-position: center 0;}
            .slick1.event_wrap .main{background-image: url("http://img.modetour.com/promotion20/11530/bg_top.jpg");}
            .slick1.event_wrap .cont2{position: relative; height: 650px; padding:100px 0; background-image: url("http://img.modetour.com/promotion20/11530/bg_cont2.jpg");}
            .slick1 .cont2 .inner{position: absolute; top:100px; left: 50%; margin-left: -300px; width:100%; height: 420px;}
            .slick1 .cont2 .slider{padding-bottom: 85px; }
            .slick1 .cont2 .slide{width: 415px;  margin-left: 20px;}
            .slick1 .cont2 button{position: absolute; bottom:0; left: 0;; width:63px; height:58px; background-image: url("http://img.modetour.com/promotion20/11530/arr.png"); background-repeat: no-repeat; background-position-x:4px; background-size: auto; text-indent: -9999; font-size: 0;}
            .slick1 .cont2 button.slick-next{left:72px; background-position-x:-65px;}
        </style>
        <script type="text/javascript">
            $(document).ready(function(){
                    $('.slick1 .slider').slick({
                        slidesToShow: 1,
                        variableWidth:true,
                        // infinite: false,
                        autoplay: false,
                        autoplaySpeed: 3000,
                        arrows:true,
                        draggable:false,
                    });
                });
        </script>	
        <div class="slick_wrap">
            <div class="comment">시작위치 조정, 컨텐츠 반복</div>
            <div class="event_wrap slick1">
                <div class="cont2">
                    <div class="slider">
                        <div class="slide">
                            <img src="http://img.modetour.com/promotion20/11530/slide1.png" alt="">
                        </div>
                        <div class="slide">
                            <img src="http://img.modetour.com/promotion20/11530/slide2.png" alt="">
                        </div>		
                        <div class="slide">
                            <img src="http://img.modetour.com/promotion20/11530/slide3.png" alt="">
                        </div>			
                        <div class="slide">
                            <img src="http://img.modetour.com/promotion20/11530/slide4.png" alt="">
                        </div>		
                        <div class="slide">
                            <img src="http://img.modetour.com/promotion20/11530/slide5.png" alt="">
                        </div>												
                    </div>
                </div>
            </div>	
        </div>
</body>
</html>
